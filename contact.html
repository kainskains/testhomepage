<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 株式会社 丸本</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body class="page-fade-in">
    <!-- Custom Loader -->
    <div id="loader">
        <div class="loader-logo">Marumoto<span>Pkg</span></div>
    </div>
    
    <header class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo">株式会社 <span>丸本</span></a>
            <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            <nav class="nav-links">
                <a href="services.html" class="link-hover">事業案内</a>
                <a href="about.html" class="link-hover">会社概要</a>
                <a href="sustainability.html" class="link-hover">サステナビリティ</a>
                <a href="quality.html" class="link-hover">品質・衛生管理</a>
                <a href="recruit.html" class="link-hover">採用情報</a>
                <a href="contact.html" class="btn btn-outline glow-btn" style="padding: 8px 20px;">お問い合わせ</a>
            </nav>
        </div>
    </header>

    <div class="page-header">
        <div class="container reveal">
            <h1>お問い合わせ</h1>
            <p>Contact Us / お見積り・ご相談</p>
        </div>
    </div>

    <section class="contact-section" style="padding: 80px 0; background: var(--bg-light);">
        <div class="container reveal">
            <div class="contact-container">
                <div style="text-align: center; margin-bottom: 40px;">
                    <h2 class="gradient-text" style="font-size: 2rem; margin-bottom: 15px;">お気軽にご相談ください</h2>
                    <p style="color: var(--text-muted);">製品のお見積り、オーダーメイド段ボールの設計のご相談、サンプル請求など、株式会社丸本へのお問い合わせはこちらからお願いいたします。</p>
                </div>
                
                <form id="contact-form">
                    <div class="form-group">
                        <label for="name">お名前 <span style="color:red">*</span></label>
                        <input type="text" id="name" class="form-control" required placeholder="例: 丸本 健太郎">
                    </div>
                    <div class="form-group">
                        <label for="company">貴社名</label>
                        <input type="text" id="company" class="form-control" placeholder="例: 株式会社〇〇">
                    </div>
                    <div class="form-group">
                        <label for="email">メールアドレス <span style="color:red">*</span></label>
                        <input type="email" id="email" class="form-control" required placeholder="yamada@example.com">
                    </div>
                    <div class="form-group">
                        <label for="inquiry-type">お問い合わせ種別</label>
                        <select id="inquiry-type" class="form-control">
                            <option value="estimation">お見積り・ご依頼</option>
                            <option value="design">オーダーメイド設計のご相談</option>
                            <option value="sample">サンプル請求</option>
                            <option value="other">その他のお問い合わせ</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message">お問い合わせ内容 <span style="color:red">*</span></label>
                        <textarea id="message" class="form-control" required placeholder="サイズやロット数、お悩みの点などを具体的にご記入ください。"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary shiny-btn" style="width: 100%; height: 60px; font-size: 1.2rem;">送信する</button>
                </form>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container footer-content" style="margin-bottom: 20px;">
            <div class="footer-brand">
                <a href="index.html" class="logo">株式会社 <span>丸本</span></a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 株式会社 丸本 All rights reserved.</p>
        </div>
    </footer>
    
    <script src="main.js"></script>
</body>
</html>
